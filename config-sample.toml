# Configuration file for wf-data-server-js
#
# DO NOT EDIT THIS FILE!
#
# Instead, copy it to config.toml, then edit the copy:
#
# cp config-sample.toml config.toml
# nano config.toml
#

[mqtt]
broker = "mqtt://localhost"
topicPattern = "nmea-debug/12345678/+"

[database]
path = "/var/tmp/test_data.db"
exclude_data_types = [
    "cog_magnetic",
    "gll_mode",
    "pressure_inches",
    "sog_kph",
    "timeUTC",
    "twd_magnetic",
    "tws_mps"
]

[server]
# The port that will be exposed by the server
port = 3001
# How many hours of history will be returned by default:
defaultHistoryHours = 12

[archive_interval]
# Time period in milliseconds to accumulate data before writing to the database
periodMs = 60000
